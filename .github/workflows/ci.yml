name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Generate public/openmower-ai-tokens.json and openmower-theme-factory.json
      - name: Generate design token files
        run: node scripts/generate-tokens.mjs

      # Build with GH Pages base path derived from the repo name
      - name: Build Vite app
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      # Generate brand guide PDF
      - name: Start preview server
        run: npx --yes serve dist -p 4173 &

      - name: Generate brand guide PDF
        run: node scripts/generate-pdf.mjs
        env:
          PORT: 4173

      # Upload PDF as build artifact
      - name: Upload brand guide PDF
        uses: actions/upload-artifact@v4
        with:
          name: openmower-brand-guide-pdf
          path: dist/openmower-brand-guide.pdf
          retention-days: 30

      # Upload full dist/ for Pages deployment
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Deploy to GitHub Pages (main branch only) ────────────────────────────────
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
